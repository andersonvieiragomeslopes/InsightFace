name: Pack NuGet

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  pack:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore InsightFace.sln

      - name: Test
        run: dotnet test tests/FaceAuth.Maui.Tests/FaceAuth.Maui.Tests.csproj -c Release --no-restore

      - name: Build FaceAuth.Maui
        run: dotnet build src/FaceAuth.Maui/FaceAuth.Maui.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/FaceAuth.Maui/FaceAuth.Maui.csproj -c Release --no-build -o artifacts

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error
